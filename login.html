<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medarbejder Login</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f1117;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.login-box{
    background:#1b2130;
    padding:40px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

h1{
    color:#f5c542;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2a3142;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#f5c542;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

#error{
    color:red;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="login-box">
    <h1>Medarbejder Login</h1>

    <input type="text" id="username" placeholder="Brugernavn">
    <input type="password" id="password" placeholder="Adgangskode">

    <button onclick="login()">Log ind</button>

    <p id="error"></p>
</div>

<script>
const users = {
    "Mini":"1234",
    "Admin":"admin123",
    "Direktør":"direktor123"
};

function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(users[username] && users[username] === password){
        localStorage.setItem("loggedIn","true");
        localStorage.setItem("user",username);

        window.location.href = "dashboard.html";
    } else {
        document.getElementById("error").innerText =
        "Forkert brugernavn eller adgangskode";
    }
}
</script>

</body>
</html>
