<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGE Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f1117;
color:white;
}

header{
background:#151922;
padding:15px;
border-bottom:2px solid #f5c542;
display:flex;
justify-content:space-between;
align-items:center;
}

h1,h2{color:#f5c542;}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:#1b2130;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#2a3142;
color:white;
}

button{
background:#f5c542;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-top:5px;
}

.item{
background:#2a3142;
padding:10px;
margin-top:10px;
border-radius:8px;
}

.small{
font-size:12px;
opacity:0.7;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
window.location.href="login.html";
}

const user = localStorage.getItem("user");
let rank = localStorage.getItem("rank");
</script>

<header>
<div>
<h2>DGE Dashboard</h2>
<div class="small">Bruger: <span id="u"></span> | Rank: <span id="r"></span></div>
</div>
<button onclick="logout()">Log ud</button>
</header>

<div class="container">

<!-- ARBEJDSSKADE -->
<div class="card">
<h2>Arbejdsskader</h2>

<input id="skadeNavn" placeholder="Navn">
<textarea id="skadeText" placeholder="Beskrivelse"></textarea>
<button onclick="addSkade()">Opret</button>

<div id="skader"></div>
</div>

<!-- BYGGEPLAN -->
<div class="card">
<h2>Byggeplaner (Alle kan se)</h2>

<input id="planTitel" placeholder="Titel">
<input id="planImg" placeholder="Billede URL">
<textarea id="planText" placeholder="Beskrivelse"></textarea>

<button onclick="addPlan()">Opret</button>

<div id="planer"></div>
</div>

<!-- ELEV RAPPORT -->
<div class="card" id="elevBox" style="display:none;">
<h2>Elev Rapporter</h2>

<input id="elevName" placeholder="Elev">
<textarea id="elevText" placeholder="Rapport"></textarea>

<button onclick="addElev()">Opret</button>

<div id="elevs"></div>
</div>

<!-- HÆNDELSER -->
<div class="card" id="eventBox" style="display:none;">
<h2>Hændelser</h2>

<input id="eventTitle" placeholder="Titel">
<textarea id="eventText" placeholder="Beskrivelse"></textarea>

<button onclick="addEvent()">Opret</button>

<div id="events"></div>
</div>

<!-- FAKTURA -->
<div class="card" id="invoiceBox" style="display:none;">
<h2>Faktura (Direktør)</h2>

<input id="kunde" placeholder="Kunde">
<input id="belob" placeholder="Beløb">
<textarea id="invoiceText"></textarea>

<button onclick="addInvoice()">Opret</button>

<div id="invoices"></div>
</div>

<!-- ADMIN PANEL -->
<div class="card" id="adminBox" style="display:none;">
<h2>Admin Control (Rank system)</h2>

<input id="targetUser" placeholder="Brugernavn">
<input id="newRank" placeholder="Ny Rank">

<button onclick="changeRank()">Skift Rank</button>

<div id="users"></div>
</div>

</div>

<script>

document.getElementById("u").innerText=user;
document.getElementById("r").innerText=rank;

/* ================= ROLLER ================= */

if(rank === "Instrucktør" || rank === "Mini Direktør"){
document.getElementById("elevBox").style.display="block";
document.getElementById("eventBox").style.display="block";
}

if(rank === "Mini Direktør"){
document.getElementById("invoiceBox").style.display="block";
document.getElementById("adminBox").style.display="block";
}

/* ================= LOGOUT ================= */

function logout(){
localStorage.clear();
window.location.href="login.html";
}

/* ================= SKADE ================= */

function addSkade(){
let n=document.getElementById("skadeNavn").value;
let t=document.getElementById("skadeText").value;

let d=JSON.parse(localStorage.getItem("skader")||"[]");
d.push({n,t});
localStorage.setItem("skader",JSON.stringify(d));
renderSkader();
}

function renderSkader(){
let d=JSON.parse(localStorage.getItem("skader")||"[]");
let h="";
d.forEach(i=>{
h+=`<div class="item"><b>${i.n}</b><br>${i.t}</div>`;
});
document.getElementById("skader").innerHTML=h;
}

/* ================= PLAN ================= */

function addPlan(){
let t=document.getElementById("planTitel").value;
let img=document.getElementById("planImg").value;
let d=document.getElementById("planText").value;

let data=JSON.parse(localStorage.getItem("planer")||"[]");
data.push({t,img,d});
localStorage.setItem("planer",JSON.stringify(data));
renderPlan();
}

function renderPlan(){
let data=JSON.parse(localStorage.getItem("planer")||"[]");
let h="";
data.forEach(i=>{
h+=`
<div class="item">
<h3>${i.t}</h3>
<p>${i.d}</p>
<img src="${i.img}" style="width:100%;border-radius:8px;">
</div>`;
});
document.getElementById("planer").innerHTML=h;
}

/* ================= ELEV ================= */

function addElev(){
let n=document.getElementById("elevName").value;
let t=document.getElementById("elevText").value;

let d=JSON.parse(localStorage.getItem("elev")||"[]");
d.push({n,t});
localStorage.setItem("elev",JSON.stringify(d));
renderElev();
}

function renderElev(){
let d=JSON.parse(localStorage.getItem("elev")||"[]");
let h="";
d.forEach(i=>{
h+=`<div class="item"><b>${i.n}</b><br>${i.t}</div>`;
});
document.getElementById("elevs").innerHTML=h;
}

/* ================= EVENTS ================= */

function addEvent(){
let t=document.getElementById("eventTitle").value;
let d=document.getElementById("eventText").value;

let data=JSON.parse(localStorage.getItem("events")||"[]");
data.push({t,d});
localStorage.setItem("events",JSON.stringify(data));
renderEvents();
}

function renderEvents(){
let data=JSON.parse(localStorage.getItem("events")||"[]");
let h="";
data.forEach(i=>{
h+=`<div class="item"><b>${i.t}</b><br>${i.d}</div>`;
});
document.getElementById("events").innerHTML=h;
}

/* ================= INVOICE ================= */

function addInvoice(){
let k=document.getElementById("kunde").value;
let b=document.getElementById("belob").value;
let t=document.getElementById("invoiceText").value;

let d=JSON.parse(localStorage.getItem("invoice")||"[]");
d.push({k,b,t});
localStorage.setItem("invoice",JSON.stringify(d));
renderInvoice();
}

function renderInvoice(){
let d=JSON.parse(localStorage.getItem("invoice")||"[]");
let h="";
d.forEach(i=>{
h+=`<div class="item"><b>${i.k}</b> - ${i.b} kr<br>${i.t}</div>`;
});
document.getElementById("invoices").innerHTML=h;
}

/* ================= ADMIN RANK SYSTEM ================= */

const DB = {
users: {
"Mini": "Mini Direktør",
"Instrucktør": "Instrucktør",
"Oplært": "Oplært",
"Under Oplæring": "Under Oplæring",
"Elev": "Elev"
}
};

function changeRank(){

let u=document.getElementById("targetUser").value;
let r=document.getElementById("newRank").value;

if(DB.users[u]){
DB.users[u]=r;
alert(u+" er nu "+r);
showUsers();
}
}

function showUsers(){
let h="";
for(let u in DB.users){
h+=`<div class="item">${u} → ${DB.users[u]}</div>`;
}
document.getElementById("users").innerHTML=h;
}

/* ================= INIT ================= */

renderSkade();
renderPlan();
renderElev();
renderEvents();
renderInvoice();
showUsers();

</script>

</body>
</html>
