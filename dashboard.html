<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGE Dashboard</title>
<style>
body{font-family:Arial;background:#111;color:white;margin:0}
header{background:#222;padding:15px;display:flex;justify-content:space-between}
.container{padding:20px}
.card{background:#1c1c1c;padding:15px;border-radius:10px;margin-bottom:15px}
input,select,textarea,button{padding:10px;margin:5px 0;width:100%;box-sizing:border-box}
button{cursor:pointer}
#adminBox{display:none}
</style>
</head>
<body>
<header>
<h2>DGE Dashboard</h2>
<div>
<button onclick="location.href='index.html'">Home</button>
<button onclick="logout()">Logout</button>
</div>
</header>

<div class="container">
<div class="card">
<h3>Brugerinfo</h3>
<p>Bruger: <span id="user"></span></p>
<p>Rank: <span id="rank"></span></p>
</div>

<div class="card" id="adminBox">
<h3>Admin Panel</h3>
<input id="targetUser" placeholder="Brugernavn">
<select id="newRank">
<option>Elev</option>
<option>Under Oplæring</option>
<option>Oplært</option>
<option>Instrucktør</option>
<option>Mini Direktør</option>
<option>Direktør</option>
</select>
<button onclick="changeRank()">Skift Rank</button>
<div id="users"></div>
</div>
</div>

<script>
if(localStorage.getItem("loggedIn")!=="true"){
location.href="login.html";
}

document.getElementById("user").innerText=localStorage.getItem("user")||"";
document.getElementById("rank").innerText=localStorage.getItem("rank")||"";

const rank=localStorage.getItem("rank");

if(rank==="Direktør"||rank==="Mini Direktør"){
document.getElementById("adminBox").style.display="block";
}

function showUsers(){
let users=JSON.parse(localStorage.getItem("users")||"{}");
let html="";
for(let u in users){
html+=`<div>${u} → ${users[u]}</div>`;
}
document.getElementById("users").innerHTML=html;
}

function changeRank(){
let users=JSON.parse(localStorage.getItem("users")||"{}");
let u=document.getElementById("targetUser").value;
let r=document.getElementById("newRank").value;

if(!users[u]){
alert("Bruger findes ikke");
return;
}

users[u]=r;
localStorage.setItem("users",JSON.stringify(users));

if(localStorage.getItem("user")===u){
localStorage.setItem("rank",r);
}

alert("Rank opdateret");
showUsers();
}

function logout(){
localStorage.removeItem("loggedIn");
localStorage.removeItem("user");
localStorage.removeItem("rank");
location.href="login.html";
}

showUsers();
</script>
</body>
</html>
