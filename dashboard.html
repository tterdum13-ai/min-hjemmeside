<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dansk Grund & Ejendom - Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f1117;
    color:white;
}

header{
    background:#151922;
    padding:20px;
    border-bottom:2px solid #f5c542;
}

h1,h2{
    color:#f5c542;
}

.container{
    padding:20px;
    max-width:1200px;
    margin:auto;
}

.card{
    background:#1b2130;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    background:#2a3142;
    color:white;
}

button{
    background:#f5c542;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin-top:5px;
}

.item{
    background:#2a3142;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}

.logout{
    float:right;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href="login.html";
}

const rank = localStorage.getItem("user");
</script>

<header>
<h1>Dansk Grund & Ejendom</h1>
<button class="logout" onclick="logout()">Log Ud</button>
</header>

<div class="container">

<!-- PROFIL -->
<div class="card">
<h2>Profil</h2>
<p>Rank: <b id="rank"></b></p>
</div>

<!-- ARBEJDSSKADE -->
<div class="card">
<h2>Arbejdsskader</h2>

<input id="skadeNavn" placeholder="Navn">
<textarea id="skadeText" placeholder="Beskrivelse"></textarea>

<button onclick="addSkade()">Opret</button>

<div id="skader"></div>
</div>

<!-- BYGGEPANEL -->
<div class="card" id="byggePanel" style="display:none;">
<h2>Byggeplaner</h2>

<input id="bygTitel" placeholder="Titel">
<input id="bygBillede" placeholder="Billede URL">
<textarea id="bygText" placeholder="Beskrivelse"></textarea>

<button onclick="addPlan()">Opret</button>

<div id="planer"></div>
</div>

<!-- ELEV RAPPORT -->
<div class="card" id="elevPanel" style="display:none;">
<h2>Elev Rapporter</h2>

<input id="elevNavn" placeholder="Elev">
<textarea id="elevText" placeholder="Rapport"></textarea>

<button onclick="addElevRapport()">Opret</button>

<div id="elevRapporter"></div>
</div>

<!-- HÆNDELSER -->
<div class="card" id="eventPanel" style="display:none;">
<h2>Hændelser</h2>

<input id="eventTitle" placeholder="Titel">
<textarea id="eventText" placeholder="Beskrivelse"></textarea>

<button onclick="addEvent()">Opret</button>

<div id="events"></div>
</div>

<!-- FAKTURA -->
<div class="card" id="invoicePanel" style="display:none;">
<h2>Faktura (Direktør)</h2>

<input id="kunde" placeholder="Kunde">
<input id="belob" placeholder="Beløb">
<textarea id="fakturaText" placeholder="Beskrivelse"></textarea>

<button onclick="addInvoice()">Opret Faktura</button>

<div id="invoices"></div>
</div>

</div>

<script>

document.getElementById("rank").innerText = rank;

/* ================= ROLLER ================= */

if(rank === "Oplært" || rank === "Instrucktør" || rank === "Mini Direktør"){
document.getElementById("byggePanel").style.display="block";
}

if(rank === "Instrucktør" || rank === "Mini Direktør"){
document.getElementById("elevPanel").style.display="block";
document.getElementById("eventPanel").style.display="block";
}

if(rank === "Mini Direktør"){
document.getElementById("invoicePanel").style.display="block";
}

/* ================= LOGOUT ================= */

function logout(){
localStorage.removeItem("loggedIn");
localStorage.removeItem("user");
window.location.href="login.html";
}

/* ================= ARBEJDSSKADE ================= */

function addSkade(){

let navn = document.getElementById("skadeNavn").value;
let text = document.getElementById("skadeText").value;

let data = JSON.parse(localStorage.getItem("skader")||"[]");

data.push({navn,text});

localStorage.setItem("skader",JSON.stringify(data));

renderSkader();
}

function renderSkader(){

let data = JSON.parse(localStorage.getItem("skader")||"[]");

let html="";

data.forEach((s,i)=>{

html+=`
<div class="item">
<b>${s.navn}</b><br>
${s.text}
</div>
`;

});

document.getElementById("skader").innerHTML=html;
}

/* ================= BYGGEPLAN ================= */

function addPlan(){

let titel = document.getElementById("bygTitel").value;
let billede = document.getElementById("bygBillede").value;
let text = document.getElementById("bygText").value;

let data = JSON.parse(localStorage.getItem("planer")||"[]");

data.push({titel,billede,text});

localStorage.setItem("planer",JSON.stringify(data));

renderPlaner();
}

function renderPlaner(){

let data = JSON.parse(localStorage.getItem("planer")||"[]");

let html="";

data.forEach((p,i)=>{

html+=`
<div class="item">
<h3>${p.titel}</h3>
<p>${p.text}</p>
<img src="${p.billede}" style="width:100%;border-radius:8px;">
</div>
`;

});

document.getElementById("planer").innerHTML=html;
}

/* ================= ELEV RAPPORT ================= */

function addElevRapport(){

let n = document.getElementById("elevNavn").value;
let t = document.getElementById("elevText").value;

let data = JSON.parse(localStorage.getItem("elevRapporter")||"[]");

data.push({n,t});

localStorage.setItem("elevRapporter",JSON.stringify(data));

renderElev();
}

function renderElev(){

let data = JSON.parse(localStorage.getItem("elevRapporter")||"[]");

let html="";

data.forEach(e=>{

html+=`
<div class="item">
<b>${e.n}</b><br>
${e.t}
</div>
`;

});

document.getElementById("elevRapporter").innerHTML=html;
}

/* ================= HÆNDELSER ================= */

function addEvent(){

let t = document.getElementById("eventTitle").value;
let d = document.getElementById("eventText").value;

let data = JSON.parse(localStorage.getItem("events")||"[]");

data.push({t,d});

localStorage.setItem("events",JSON.stringify(data));

renderEvents();
}

function renderEvents(){

let data = JSON.parse(localStorage.getItem("events")||"[]");

let html="";

data.forEach(e=>{

html+=`
<div class="item">
<b>${e.t}</b><br>
${e.d}
</div>
`;

});

document.getElementById("events").innerHTML=html;
}

/* ================= FAKTURA ================= */

function addInvoice(){

let k = document.getElementById("kunde").value;
let b = document.getElementById("belob").value;
let t = document.getElementById("fakturaText").value;

let data = JSON.parse(localStorage.getItem("invoices")||"[]");

data.push({k,b,t});

localStorage.setItem("invoices",JSON.stringify(data));

renderInvoices();
}

function renderInvoices(){

let data = JSON.parse(localStorage.getItem("invoices")||"[]");

let html="";

data.forEach(i=>{

html+=`
<div class="item">
<b>${i.k}</b> - ${i.b} kr<br>
${i.t}
</div>
`;

});

document.getElementById("invoices").innerHTML=html;
}

/* ================= INIT ================= */

renderSkader();
renderPlaner();
renderElev();
renderEvents();
renderInvoices();

</script>

</body>
</html>
